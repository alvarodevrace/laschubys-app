<div class="flex flex-col gap-1" data-testid="input">
  @if (label()) {
    <label [attr.for]="id()" class="text-muted-foreground text-sm">{{ label() }}</label>
  }

  @switch (type()) {
    @case ('textarea') {
      <textarea
        [id]="id()"
        [placeholder]="placeholder()"
        [required]="required()"
        class="rounded-2xl border border-border bg-white min-h-24 px-4 py-3 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all resize-none"
      ></textarea>
    }
    @case ('select') {
      <select
        [id]="id()"
        [required]="required()"
        class="rounded-2xl border border-border bg-white min-h-12 px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all appearance-none"
      >
        @if (placeholder()) {
          <option value="" disabled selected>{{ placeholder() }}</option>
        }
        @for (option of options(); track option) {
          <option [value]="option">{{ option }}</option>
        }
      </select>
    }
    @default {
      <input
        [id]="id()"
        [type]="type()"
        [placeholder]="placeholder()"
        [required]="required()"
        class="rounded-2xl border border-border bg-white min-h-12 px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
      />
    }
  }

  @if (error()) {
    <span class="text-red-500 text-sm">{{ error() }}</span>
  }
</div>
